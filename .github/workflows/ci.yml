name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

env:
  QUARTO_VERSION: 1.9.36

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: ${{ env.QUARTO_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint markdown
        run: npm run lint

      - name: Build project
        run: npm run build

  template-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: ${{ env.QUARTO_VERSION }}

      - name: Simulate template consumer flow
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          git archive --format=tar HEAD | tar -xf - -C "$tmpdir"
          cd "$tmpdir"

          npm run init -- --title "Smoke Test Book" --author "CI" --year 2026 --slug smoke-test-book --repo https://github.com/example/smoke-test-book --non-interactive

          test -f .template-init.json
          grep -q '^# Smoke Test Book$' README.md
          grep -q 'https://github.com/example/smoke-test-book' README.md
          grep -q '^# Smoke Test Book {.unnumbered}$' index.qmd
          grep -q 'title: "Smoke Test Book"' _quarto.yml
          grep -q 'author: "CI"' _quarto.yml
          grep -q 'output-file: "smoke-test-book"' _quarto.yml
          grep -q 'href: "https://github.com/example/smoke-test-book"' _quarto.yml
          grep -q '"name": "smoke-test-book"' package.json
          grep -q '"description": "A Quarto book project for Smoke Test Book."' package.json
          grep -q '"name": "smoke-test-book"' package-lock.json
          grep -q '作者：CI' book/license.qmd
          grep -q '仓库：<https://github.com/example/smoke-test-book>' book/license.qmd
          ! grep -R -E 'Template Book|Template Author|template-book|https://github.com/your-org/template-book' README.md _quarto.yml book/license.qmd package.json package-lock.json index.qmd book/preface.qmd book/introduction.qmd book/chapters

          if npm run init -- --title "Should Fail" --author "CI" --year 2026 --slug should-fail --repo https://github.com/example/should-fail --non-interactive; then
            echo "expected second init without --force to fail"
            exit 1
          fi

          npm run init -- --title "Smoke Test Book" --author "CI" --year 2026 --slug smoke-test-book --repo https://github.com/example/smoke-test-book --non-interactive --force
          npm ci
          npm run build
          test -f _book/index.html
